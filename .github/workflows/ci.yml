name: CI - Test and Lint

on:
  push:
    branches: [main, dev, "feat/**"]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./smart-sleeve-app

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ./smart-sleeve-app/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run unit tests
        run: npm test

      - name: 💅 Lint code
        run: npm run lint

  clinician-portal-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./clinician-portal

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ./clinician-portal/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗 Build clinician portal
        run: npm run build
